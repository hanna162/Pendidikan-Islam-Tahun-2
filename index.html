function playTone(freq,dur,type='sine'){const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0.3,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+dur);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);}

const c=document.getElementById('confetti-container');
c.innerHTML='';
const colors=['#f59e0b','#10b981','#3b82f6','#ef4444','#8b5cf6','#ec4899'];
for(let i=0;i<30;i++){
const p=document.createElement('div');p.className='confetti-piece';
p.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${colors[i%colors.length]};animation-delay:${Math.random()*0.5}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;`;
c.appendChild(p);
}
setTimeout(()=>c.innerHTML='',2000);
}

function shuffle(arr) {
    for (let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
    return arr;
}

function startQuiz() {
    const bank = questionBank[currentUnit];
    if (!bank || bank.length === 0) { renderMenu(); return; }
    let available = [];
    for (let i=0; i<bank.length; i++) {
        if (!usedQuestions[currentUnit].includes(i)) available.push(i);
    }
    if (available.length < totalQuestions) {
        usedQuestions[currentUnit] = [];
        available = bank.map((_,i)=>i);
    }
    shuffle(available);
    const picked = available.slice(0, totalQuestions);
    usedQuestions[currentUnit].push(...picked);
    quizQuestions = picked.map(i=>({...bank[i], _idx:i}));
    quizIndex = 0;
    score = 0;
    answered = false;
    renderQuestion();
}

function renderProgressBar() {
    const pct = (quizIndex / totalQuestions) * 100;
    return `<div class="w-full bg-gray-200 rounded-full h-3 mb-4 overflow-hidden">
        <div class="progress-fill h-full rounded-full bg-gradient-to-r from-green-400 to-emerald-500" style="width:${pct}%"></div>
    </div>
    <div class="flex justify-between items-center mb-3">
        <span class="text-sm font-bold text-green-600">Soalan ${quizIndex+1} / ${totalQuestions}</span>
        <span class="text-sm font-bold text-amber-500">⭐ ${score}</span>
    </div>`;
}

function renderQuestion() {
    answered = false;
    const q = quizQuestions[quizIndex];
    let body = '';

    if (q.type === 'mcq') {
        let optIndices = q.opts.map((_,i)=>i);
        shuffle(optIndices);
        body = optIndices.map(oi=>`
            <button onclick="checkMCQ(${oi},this)" class="opt-btn card-hover w-full p-4 rounded-xl text-left font-medium bg-white border-2 border-gray-200 shadow-sm hover:border-blue-300 transition-colors">${q.opts[oi]}</button>
        `).join('');
    } else if (q.type === 'tf') {
        body = `
            <button onclick="checkTF(true,this)" class="opt-btn card-hover w-full p-4 rounded-xl text-lg font-bold bg-emerald-50 border-2 border-emerald-200 hover:border-emerald-400 transition-colors">✅ Betul</button>
            <button onclick="checkTF(false,this)" class="opt-btn card-hover w-full p-4 rounded-xl text-lg font-bold bg-red-50 border-2 border-red-200 hover:border-red-400 transition-colors">❌ Salah</button>
        `;
    } else if (q.type === 'fill') {
        body = `
            <div class="bg-white rounded-xl p-4 shadow-sm border-2 border-gray-200">
                <input id="fill-input" type="text" class="w-full p-3 border-2 border-gray-300 rounded-lg text-lg focus:border-blue-500 focus:outline-none" placeholder="Taipkan jawapan..." autocomplete="off">
                <button onclick="checkFill()" class="mt-3 w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-colors">Hantar ✓</button>
            </div>
        `;
    }

    content.innerHTML = `
        <div class="fade-in max-w-lg mx-auto">
            ${renderProgressBar()}
            <div class="bg-white rounded-2xl p-5 shadow-lg mb-4 border border-gray-100">
                <p class="text-lg font-semibold text-gray-800 leading-relaxed">${q.q}</p>
            </div>
            <div class="flex flex-col gap-3" id="options">${body}</div>
        </div>
    `;
}

function checkMCQ(selected, btn) {
    if (answered) return;
    answered = true;
    const q = quizQuestions[quizIndex];
    const correct = selected === q.ans;
    const btns = document.querySelectorAll('.opt-btn');
    btns.forEach(b => { b.disabled = true; b.style.pointerEvents = 'none'; });
    btn.classList.remove('border-gray-200');
    btn.classList.add(correct ? 'border-green-500' : 'border-red-500', correct ? 'bg-green-100' : 'bg-red-100');
    if (!correct) {
        btns.forEach(b => { if (b.textContent.trim() === q.opts[q.ans]) b.classList.add('border-green-500','bg-green-100'); });
    }
    if (correct) { score++; playCorrect(); showConfetti(); }
    else { playWrong(); }
    setTimeout(()=>{ quizIndex++; if (quizIndex >= totalQuestions) showResults(); else renderQuestion(); }, 1200);
}

function checkTF(selected, btn) {
    if (answered) return;
    answered = true;
    const q = quizQuestions[quizIndex];
    const correct = selected === q.ans;
    const btns = document.querySelectorAll('.opt-btn');
    btns.forEach(b => { b.disabled = true; b.style.pointerEvents = 'none'; });
    btn.classList.add(correct ? 'border-green-500' : 'border-red-500', correct ? 'bg-green-100' : 'bg-red-100');
    if (!correct) { btns.forEach(b => { if (b !== btn) b.classList.add('border-green-500','bg-green-100'); }); }
    if (correct) { score++; playCorrect(); showConfetti(); }
    else { playWrong(); }
    setTimeout(()=>{ quizIndex++; if (quizIndex >= totalQuestions) showResults(); else renderQuestion(); }, 1200);
}

function checkFill() {
    if (answered) return;
    const input = document.getElementById('fill-input');
    const val = input.value.trim().toLowerCase();
    if (!val) return;
    answered = true;
    const q = quizQuestions[quizIndex];
    const correct = val === q.ans.toLowerCase();
    input.disabled = true;
    input.classList.add(correct ? 'border-green-500' : 'border-red-500');
    if (!correct) {
        input.insertAdjacentHTML('afterend', `<p class="mt-2 text-green-700 font-bold">Jawapan: ${q.ans}</p>`);
    }
    if (correct) { score++; playCorrect(); showConfetti(); }
    else { playWrong(); }
    setTimeout(()=>{ quizIndex++; if (quizIndex >= totalQuestions) showResults(); else renderQuestion(); }, 1200);
}

function showFeedback(correct) {
    if (correct) { score++; playCorrect(); showConfetti(); }
    else { playWrong(); content.querySelector('.max-w-lg')?.classList.add('shake'); }
    setTimeout(()=>{
        quizIndex++;
        if (quizIndex >= totalQuestions) showResults();
        else renderQuestion();
    }, 1200);
}

function showResults() {
    playComplete();
    showConfetti();
    const pct = Math.round((score/totalQuestions)*100);
    const stars = score === totalQuestions ? 3 : score >= Math.ceil(totalQuestions*0.6) ? 2 : score >= Math.ceil(totalQuestions*0.4) ? 1 : 0;
    const badge = stars === 3 ? '🏆' : stars === 2 ? '🥈' : stars === 1 ? '🥉' : '💪';
    const msg = stars===3?'Sempurna! 🎉':stars===2?'Tahniah! 🌟':stars===1?'Bagus! ⭐':'Jangan putus asa! 💪';
    const starsHtml = Array(3).fill(0).map((_,i)=>`<span class="${i<stars?'star-burst':'opacity-30'} text-4xl inline-block" style="animation-delay:${i*0.2}s">${i<stars?'⭐':'☆'}</span>`).join('');

    content.innerHTML = `
        <div class="fade-in max-w-lg mx-auto text-center">
            <div class="bg-gradient-to-br from-white to-blue-50 rounded-3xl p-8 shadow-2xl border-2 border-emerald-200">
                <div class="text-7xl mb-4 badge-glow inline-block">${badge}</div>
                <div class="mb-4">${starsHtml}</div>
                <h2 class="text-3xl font-bold text-gray-800 mb-2">${msg}</h2>
                <p class="text-lg text-gray-600 mb-6 font-semibold">Anda mendapat ${score} ⭐ daripada ${totalQuestions}</p>
                <div class="w-full bg-gray-200 rounded-full h-5 mb-6 overflow-hidden shadow-md">
                    <div class="h-full rounded-full bg-gradient-to-r from-amber-400 to-orange-500 transition-all duration-1000" style="width:${pct}%"></div>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-green-50 rounded-xl p-4 border-2 border-green-300"><p class="text-3xl font-bold text-green-600">${score}</p><p class="text-xs text-green-700 font-semibold mt-1">Betul ✅</p></div>
                    <div class="bg-red-50 rounded-xl p-4 border-2 border-red-300"><p class="text-3xl font-bold text-red-500">${totalQuestions-score}</p><p class="text-xs text-red-600 font-semibold mt-1">Salah ❌</p></div>
                </div>
                <div class="flex flex-col gap-3">
                    <button onclick="startMode('${window.currentMode}')" class="card-hover bg-gradient-to-r from-blue-500 to-blue-600 text-white font-bold py-4 rounded-xl text-lg shadow-lg">🔄 Cuba Lagi</button>
                    ${currentSubject ? `<button onclick="selectSubject('${currentSubject.id}')" class="card-hover bg-gradient-to-r from-purple-500 to-purple-600 text-white font-bold py-4 rounded-xl text-lg shadow-lg">📚 Pilih Unit</button>` : ''}
                    <button onclick="goHome()" class="card-hover bg-gradient-to-r from-gray-500 to-gray-600 text-white font-bold py-4 rounded-xl text-lg shadow-lg">🏠 Menu Utama</button>
                </div>
            </div>
        </div>
    `;
}
